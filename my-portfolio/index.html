<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmanuel | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Background Canvas for Particles -->
    <canvas id="bgCanvas"></canvas>

    <header>
        <div class="logo-container">
            <div class="logo">E</div>
            <span class="name">Emmanuel</span>
        </div>
    </header>

    <main>
        <section class="hero scroll-reveal">
            <div class="rainbow-box">
                <h1>Web Developer & AI Enthusiast</h1>
            </div>
        </section>

        <section class="about scroll-reveal">
            <div class="rainbow-box">
                <h2>About Me</h2>
                <p>Building the future with code and creativity.</p>
            </div>
        </section>

        <section class="contact scroll-reveal">
            <div class="rainbow-box">
                <h2>Message Me</h2>
                <form action="https://formspree.io/f/mvzdyqrk" method="POST">
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <!-- WhatsApp Icon -->
    <a href="https://wa.me/yourphonenumber" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
