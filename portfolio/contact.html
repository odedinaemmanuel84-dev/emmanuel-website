<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Emmanuel Odedina</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->

    <section class="contact-section">
        <div class="container">
            <h2>Get In Touch</h2>
            <p>I'm currently available for new projects. Fill the form or send me an email.</p>
            
            <form id="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Tell me about your project..." required></textarea>
                <button type="submit" class="btn primary">Send Message</button>
            </form>
            
            <div class="contact-info">
                <p><i class="fas fa-envelope"></i> your.email@example.com</p>
                <p><i class="fas fa-phone"></i> +234 XXX XXX XXXX</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
